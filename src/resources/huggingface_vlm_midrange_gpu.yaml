schema_version: "1.0"

vision:
  whole_frame: true
  crops: true
  models:
    huggingface_vlms:
      - name: "smolvlm2_2_2b"
        enabled: true
        model_id: "HuggingFaceTB/SmolVLM2-2.2B-Instruct"
        input_mode: "chat"
        dtype: "float16"
        quantization: "none"
        generation:
          max_new_tokens: 192
      - name: "qwen2_5_vl_3b"
        enabled: true
        model_id: "Qwen/Qwen2.5-VL-3B-Instruct"
        input_mode: "chat"
        dtype: "float16"
        quantization: "4bit"
        device_map: "auto"
        generation:
          max_new_tokens: 192
        processor_kwargs:
          min_pixels: 100352
          max_pixels: 401408

performance:
  device: "auto"
  hardware_profile: "midrange_gpu"
  dtype: "float16"
  inference_batch_size: 1
  low_vram_mode: true
  unload_models_between_stages: true
