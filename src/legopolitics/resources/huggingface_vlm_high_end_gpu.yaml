schema_version: "1.0"

vision:
  whole_frame: true
  crops: true
  models:
    huggingface_vlms:
      - name: "smolvlm2_2_2b"
        enabled: true
        model_id: "HuggingFaceTB/SmolVLM2-2.2B-Instruct"
        input_mode: "chat"
        dtype: "bfloat16"
        generation:
          max_new_tokens: 256
      - name: "qwen2_5_vl_3b"
        enabled: true
        model_id: "Qwen/Qwen2.5-VL-3B-Instruct"
        input_mode: "chat"
        dtype: "bfloat16"
        generation:
          max_new_tokens: 256
        processor_kwargs:
          min_pixels: 200704
          max_pixels: 802816
      - name: "idefics3_8b"
        enabled: false
        model_id: "HuggingFaceM4/Idefics3-8B-Llama3"
        input_mode: "chat"
        dtype: "bfloat16"
        quantization: "4bit"
        device_map: "auto"
        generation:
          max_new_tokens: 256

performance:
  device: "auto"
  hardware_profile: "high_end_gpu"
  dtype: "bfloat16"
  inference_batch_size: 1
  unload_models_between_stages: true
