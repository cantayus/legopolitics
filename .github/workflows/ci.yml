name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade --no-cache-dir -e ".[dev]"
          python -c "import typer; print(f'Typer version: {typer.__version__}')"
      - name: Check formatting
        run: ruff format --check src tests
      - name: Lint
        run: ruff check src tests
      - name: Type check on minimum supported Python
        if: ${{ matrix.python-version == '3.10' }}
        run: mypy src/legopolitics
      - name: Test
        run: python -m pytest --cov=legopolitics --cov-report=term-missing --cov-fail-under=60
      - name: Build documentation
        run: mkdocs build --strict
      - name: Build distributions
        run: python -m build
      - name: Validate distributions
        run: python -m twine check --strict dist/*
