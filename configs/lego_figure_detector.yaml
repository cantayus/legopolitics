schema_version: "1.0"

project:
  name: "LEGO-figure political video analysis"
  output_root: "outputs"
  resume: true

sampling:
  mode: "hybrid"
  fps: 1.0
  include_scene_boundaries: true
  motion_sampling: true

legal:
  ultralytics_license_acknowledged: false

detection:
  enabled: true
  primary_backend: "yolo"
  yolo:
    weights: "models/lego_figure_best.pt"
    task: "detect"
    confidence_threshold: 0.30
    iou_threshold: 0.50
    image_size: 1280
    device: "auto"
    half_precision: true
    class_filter: null
    save_annotated_frames: true
  open_vocabulary:
    enabled: false

tracking:
  enabled: true
  backend: "iou"
  iou_match_threshold: 0.30
  maximum_track_gap_frames: 10

vision:
  whole_frame: true
  crops: true
  context_crops: true
  track_representatives: true
  models:
    florence2:
      enabled: true
      model_id: "microsoft/Florence-2-large-ft"
      tasks:
        - "more_detailed_caption"
        - "ocr_with_region"
    huggingface_vlms:
      - name: "smolvlm2"
        enabled: true
        model_id: "HuggingFaceTB/SmolVLM2-2.2B-Instruct"
        input_mode: "chat"
        dtype: "bfloat16"
        generation:
          max_new_tokens: 256
      - name: "qwen2_5_vl"
        enabled: true
        model_id: "Qwen/Qwen2.5-VL-3B-Instruct"
        input_mode: "chat"
        dtype: "bfloat16"
        generation:
          max_new_tokens: 256
        processor_kwargs:
          min_pixels: 200704
          max_pixels: 802816
      - name: "idefics3"
        enabled: false
        model_id: "HuggingFaceM4/Idefics3-8B-Llama3"
        input_mode: "chat"
        dtype: "bfloat16"
        generation:
          max_new_tokens: 256
      - name: "llava_onevision"
        enabled: false
        model_id: "llava-hf/llava-onevision-qwen2-7b-ov-hf"
        input_mode: "chat"
        dtype: "float16"
        generation:
          max_new_tokens: 256

prompting:
  blind_visual_pass: true
  contextual_pass: true
  codebook_pass: true
  contradiction_pass: true
  save_rendered_prompts: true
  save_raw_responses: true

performance:
  device: "auto"
  dtype: "auto"
  unload_models_between_stages: true
  low_vram_mode: false
  oom_recovery: true

output:
  excel: true
  parquet: true
  jsonl: true
  sqlite: true
  html_report: true
  save_frames: true
  save_crops: true
  save_annotated_frames: true
