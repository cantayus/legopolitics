schema_version: "1.0"

vision:
  whole_frame: true
  crops: true
  models:
    huggingface_vlms:
      - name: "smolvlm2_500m"
        enabled: true
        model_id: "HuggingFaceTB/SmolVLM2-500M-Video-Instruct"
        input_mode: "chat"
        dtype: "float16"
        quantization: "none"
        generation:
          max_new_tokens: 128

performance:
  device: "auto"
  hardware_profile: "small_gpu"
  dtype: "float16"
  inference_batch_size: 1
  low_vram_mode: true
  unload_models_between_stages: true
